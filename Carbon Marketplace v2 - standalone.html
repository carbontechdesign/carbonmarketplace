document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PRODUTO (interativo) ============ -->\n<section id=\"produto\" style=\"padding:104px 0;background:#FAFAFC;border-top:1px solid #E2E7F0;border-bottom:1px solid #E2E7F0\">\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n    <div data-reveal=\"\" style=\"max-width:680px;margin:0 auto 44px;text-align:center\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:#1676BC;display:inline-flex;align-items:center;gap:.6rem;font-weight:500\"><span style=\"width:7px;height:7px;border-radius:2px;background:#1EA1FF\"><\u002Fspan>Por dentro<\u002Fspan>\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;letter-spacing:-.025em;line-height:1.06;font-size:clamp(2rem,3.8vw,3rem);margin:16px 0 14px;color:#1E232B\">O painel que o seller usa todo dia.<\u002Fh2>\n      <p style=\"font-size:1.12rem;color:#5E6573\">Cada vendedor entra num painel próprio — pedidos, catálogo e financeiro — isolado e na sua marca. Navegue pelas telas reais do produto.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"max-width:1060px;margin:0 auto\">\n      <!-- TAB BAR -->\n      <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px\">\n        <div onclick=\"{{ setOverview }}\" style=\"{{ pillOverview }}\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.6\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.6\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.6\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.6\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><\u002Fsvg>Visão geral\n        <\u002Fdiv>\n        <div onclick=\"{{ setPedidos }}\" style=\"{{ pillPedidos }}\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M3.3 7L12 12l8.7-5M12 22V12\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Pedidos\n        <\u002Fdiv>\n        <div onclick=\"{{ setProdutos }}\" style=\"{{ pillProdutos }}\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 7.5V4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 .7.3l11 11a1 1 0 0 1 0 1.4l-4.5 4.5a1 1 0 0 1-1.4 0l-11-11a1 1 0 0 1-.3-.7z\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"7\" cy=\"7\" r=\"1.4\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg>Produtos\n        <\u002Fdiv>\n        <div onclick=\"{{ setFinanceiro }}\" style=\"{{ pillFinanceiro }}\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 18V10m5 8V6m5 12v-9m5 9V8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Financeiro\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- BROWSER FRAME -->\n      <div style=\"position:relative;border-radius:18px;overflow:hidden;background:#FFFFFF;border:1px solid #E2E7F0;box-shadow:0 44px 96px -38px rgba(30,35,43,.36),0 16px 36px -20px rgba(30,35,43,.2)\">\n        <span style=\"position:absolute;z-index:6;bottom:18px;right:18px;background:#1E232B;color:#fff;border-radius:10px;padding:8px 13px;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 14px 30px -10px rgba(30,35,43,.55)\" data-hide-sm=\"\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"4\" y=\"10\" width=\"16\" height=\"11\" rx=\"2\" stroke=\"#5BBDFF\" stroke-width=\"2\"><\u002Frect><path d=\"M8 10V7a4 4 0 0 1 8 0v3\" stroke=\"#5BBDFF\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>Cada seller vê só o que é seu\n        <\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:8px;padding:12px 16px;background:#F5F7FA;border-bottom:1px solid #E2E7F0\">\n          <div style=\"display:flex;gap:6px\"><i style=\"width:11px;height:11px;border-radius:50%;background:#FF5F57;display:block\"><\u002Fi><i style=\"width:11px;height:11px;border-radius:50%;background:#FEBC2E;display:block\"><\u002Fi><i style=\"width:11px;height:11px;border-radius:50%;background:#28C840;display:block\"><\u002Fi><\u002Fdiv>\n          <div style=\"margin-left:10px;flex:1;max-width:420px;background:#FFFFFF;border:1px solid #E2E7F0;border-radius:8px;padding:5px 14px;font-family:'IBM Plex Mono',monospace;font-size:.74rem;color:#5E6573;display:flex;align-items:center;gap:7px\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\" stroke=\"#9AA3B2\" stroke-width=\"2\"><\u002Frect><path d=\"M8 11V8a4 4 0 0 1 8 0v3\" stroke=\"#9AA3B2\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>app.carbonmarketplace.com / seller<\u002Fdiv>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:.66rem;color:#9AA3B2;text-transform:uppercase;letter-spacing:.05em\" data-hide-sm=\"\">painel do seller<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:relative;width:100%;aspect-ratio:909 / 525;background:#F6F7FA\">\n          <img src=\"d0e48de5-ad3b-4559-b2a0-2fa972a7ad22\" alt=\"Painel do seller — visão geral\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;transition:opacity .45s ease;opacity:{{ opOverview }}\">\n          <img src=\"85b4e5c3-2b4e-4309-bd3a-7c7cdabce7d3\" alt=\"Painel do seller — pedidos\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;transition:opacity .45s ease;opacity:{{ opPedidos }}\">\n          <img src=\"73004e68-7c62-4105-bbf1-e1f0cb4e720c\" alt=\"Painel do seller — produtos\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;transition:opacity .45s ease;opacity:{{ opProdutos }}\">\n          <img src=\"ee238eb2-4785-4a31-a586-54cd21574846\" alt=\"Painel do seller — financeiro\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;transition:opacity .45s ease;opacity:{{ opFinanceiro }}\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CAPTION -->\n      <div style=\"max-width:620px;margin:26px auto 0;text-align:center\">\n        <div style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.22rem;letter-spacing:-.02em;color:#1E232B;margin-bottom:5px\">{{ activeTitle }}<\u002Fdiv>\n        <div style=\"color:#5E6573;font-size:1.02rem\">{{ activeDesc }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PARA QUEM ============ -->\n<section id=\"publicos\" style=\"padding:104px 0;background:#FFFFFF\">\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n    <div data-reveal=\"\" style=\"max-width:680px;margin:0 auto 56px;text-align:center\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:#1676BC;display:inline-flex;align-items:center;gap:.6rem;font-weight:500\"><span style=\"width:7px;height:7px;border-radius:2px;background:#1EA1FF\"><\u002Fspan>Para quem<\u002Fspan>\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;letter-spacing:-.025em;line-height:1.06;font-size:clamp(2rem,3.8vw,3rem);margin:16px 0 14px;color:#1E232B\">Três lados, uma infraestrutura.<\u002Fh2>\n    <\u002Fdiv>\n    <div data-cols=\"\" data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n      <div style=\"position:relative;border:1px solid #E2E7F0;border-radius:18px;padding:30px 28px;background:#FFFFFF;overflow:hidden\" style-hover=\"box-shadow:0 24px 50px -28px rgba(30,35,43,.22);transform:translateY(-4px)\">\n        <span style=\"position:absolute;top:0;left:0;right:0;height:4px;background:#1EA1FF\"><\u002Fspan>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#9AA3B2\">Marketplace owner<\u002Fdiv>\n        <h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.4rem;margin:8px 0 12px;letter-spacing:-.02em\">O varejista dono<\u002Fh3>\n        <p style=\"color:#5E6573;font-size:.96rem;margin-bottom:16px\">Grandes varejistas SFCC que querem monetizar a plataforma sem virar empresa de software.<\u002Fp>\n        <div style=\"display:grid;gap:9px\">\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Nova receita por comissão<\u002Fdiv>\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Catálogo amplo sem comprar estoque<\u002Fdiv>\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Controle total da experiência<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;border:1px solid #E2E7F0;border-radius:18px;padding:30px 28px;background:#FFFFFF;overflow:hidden\" style-hover=\"box-shadow:0 24px 50px -28px rgba(30,35,43,.22);transform:translateY(-4px)\">\n        <span style=\"position:absolute;top:0;left:0;right:0;height:4px;background:#1676BC\"><\u002Fspan>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#9AA3B2\">Seller<\u002Fdiv>\n        <h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.4rem;margin:8px 0 12px;letter-spacing:-.02em\">O vendedor parceiro<\u002Fh3>\n        <p style=\"color:#5E6573;font-size:.96rem;margin-bottom:16px\">Sellers terceirizados que querem vender numa plataforma estabelecida, sem fricção técnica.<\u002Fp>\n        <div style=\"display:grid;gap:9px\">\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Onboarding guiado e rápido<\u002Fdiv>\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Painel próprio de estoque e preço<\u002Fdiv>\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Repasses transparentes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;border:1px solid #E2E7F0;border-radius:18px;padding:30px 28px;background:#FFFFFF;overflow:hidden\" style-hover=\"box-shadow:0 24px 50px -28px rgba(30,35,43,.22);transform:translateY(-4px)\">\n        <span style=\"position:absolute;top:0;left:0;right:0;height:4px;background:#8FD0FF\"><\u002Fspan>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#9AA3B2\">Comprador<\u002Fdiv>\n        <h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.4rem;margin:8px 0 12px;letter-spacing:-.02em\">O cliente final<\u002Fh3>\n        <p style=\"color:#5E6573;font-size:.96rem;margin-bottom:16px\">Quem compra na storefront — sem perceber que navega por dezenas de sellers.<\u002Fp>\n        <div style=\"display:grid;gap:9px\">\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Uma experiência de marca só<\u002Fdiv>\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Mais variedade, mesmo checkout<\u002Fdiv>\n          <div style=\"display:flex;gap:9px;font-size:.92rem\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:3px\"><path d=\"M5 12l4 4L19 6\" stroke=\"#1676BC\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Estoque sempre confiável<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ RECURSOS ============ -->\n<section id=\"recursos\" style=\"padding:104px 0;background:#E8F6FF\">\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n    <div data-reveal=\"\" style=\"max-width:680px;margin:0 auto 56px;text-align:center\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:#1676BC;display:inline-flex;align-items:center;gap:.6rem;font-weight:500\"><span style=\"width:7px;height:7px;border-radius:2px;background:#1EA1FF\"><\u002Fspan>Recursos<\u002Fspan>\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;letter-spacing:-.025em;line-height:1.06;font-size:clamp(2rem,3.8vw,3rem);margin:16px 0 14px;color:#1E232B\">A parte difícil, resolvida de infraestrutura.<\u002Fh2>\n    <\u002Fdiv>\n    <div data-cols=\"\" data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#E2E7F0;border:1px solid #E2E7F0;border-radius:22px;overflow:hidden\">\n      <div style=\"background:#FFFFFF;padding:32px 28px\" style-hover=\"background:#FBFDFF\"><div style=\"width:46px;height:46px;border-radius:12px;background:#1E232B;color:#5BBDFF;display:grid;place-items:center;margin-bottom:18px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fcircle><path d=\"M19 8v6M22 11h-6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.16rem;margin-bottom:8px;letter-spacing:-.02em\">Onboarding de sellers<\u002Fh3><p style=\"color:#5E6573;font-size:.95rem\">Fluxo padronizado de cadastro, contrato e ativação. Do convite ao primeiro SKU publicado.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#FFFFFF;padding:32px 28px\" style-hover=\"background:#FBFDFF\"><div style=\"width:46px;height:46px;border-radius:12px;background:#1E232B;color:#5BBDFF;display:grid;place-items:center;margin-bottom:18px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M9 11l3 3L22 4\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.16rem;margin-bottom:8px;letter-spacing:-.02em\">Approval &amp; curadoria<\u002Fh3><p style=\"color:#5E6573;font-size:.95rem\">Workflow de aprovação de produto e seller com regras suas. Nada vai ao ar sem o seu crivo.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#FFFFFF;padding:32px 28px\" style-hover=\"background:#FBFDFF\"><div style=\"width:46px;height:46px;border-radius:12px;background:#1E232B;color:#5BBDFF;display:grid;place-items:center;margin-bottom:18px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M21 12a9 9 0 1 1-3-6.7L21 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M21 3v5h-5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.16rem;margin-bottom:8px;letter-spacing:-.02em\">Sync de inventário<\u002Fh3><p style=\"color:#5E6573;font-size:.95rem\">Estoque e preço por seller em tempo real. Sem venda de item esgotado, sem preço defasado.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#FFFFFF;padding:32px 28px\" style-hover=\"background:#FBFDFF\"><div style=\"width:46px;height:46px;border-radius:12px;background:#1E232B;color:#5BBDFF;display:grid;place-items:center;margin-bottom:18px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"10\" rx=\"2\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.16rem;margin-bottom:8px;letter-spacing:-.02em\">Isolamento de dados<\u002Fh3><p style=\"color:#5E6573;font-size:.95rem\">Cada seller enxerga só o próprio domínio. Separação garantida por arquitetura, não por convenção.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#FFFFFF;padding:32px 28px\" style-hover=\"background:#FBFDFF\"><div style=\"width:46px;height:46px;border-radius:12px;background:#1E232B;color:#5BBDFF;display:grid;place-items:center;margin-bottom:18px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 17V9m5 8V5m5 12v-6m5 6V8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.16rem;margin-bottom:8px;letter-spacing:-.02em\">Repasses &amp; split<\u002Fh3><p style=\"color:#5E6573;font-size:.95rem\">Comissão, taxa e repasse calculados e liquidados por pedido. O financeiro fecha sozinho.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#FFFFFF;padding:32px 28px\" style-hover=\"background:#FBFDFF\"><div style=\"width:46px;height:46px;border-radius:12px;background:#1E232B;color:#5BBDFF;display:grid;place-items:center;margin-bottom:18px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"8\" height=\"8\" rx=\"1.6\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><rect x=\"13\" y=\"3\" width=\"8\" height=\"8\" rx=\"1.6\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><rect x=\"3\" y=\"13\" width=\"8\" height=\"8\" rx=\"1.6\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><rect x=\"13\" y=\"13\" width=\"8\" height=\"8\" rx=\"1.6\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><\u002Fsvg><\u002Fdiv><h3 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:1.16rem;margin-bottom:8px;letter-spacing:-.02em\">Zero dev customizado<\u002Fh3><p style=\"color:#5E6573;font-size:.95rem\">Configuração sobre o SFCC, não reescrita. Sai em semanas, não em trimestres.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ MÉTRICAS (azul cheio) ============ -->\n<section style=\"padding:96px 0;background:linear-gradient(160deg,#1676BC,#0F4D80);color:#fff;overflow:hidden;position:relative\">\n  <div style=\"position:absolute;left:-8%;bottom:-40%;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(91,189,255,.34),transparent 60%);pointer-events:none\"><\u002Fdiv>\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:0 32px;position:relative;z-index:2\">\n    <p data-reveal=\"\" style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:clamp(1.7rem,3.2vw,2.5rem);max-width:22ch;line-height:1.12;margin-bottom:52px;letter-spacing:-.02em\">Cada seller que entra é <span style=\"color:#8FD0FF\">catálogo e receita que você não precisou comprar.<\u002Fspan><\u002Fp>\n    <div data-cols=\"\" data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:30px\">\n      <div><div style=\"font-family:'Schibsted Grotesk',sans-serif;font-size:clamp(2.6rem,5vw,3.7rem);font-weight:800;line-height:1\"><span data-count=\"6\" data-pre=\"~\" data-suf=\" sem\">~6 sem<\u002Fspan><\u002Fdiv><div style=\"margin-top:10px;color:#D6EAFB;font-size:.98rem;max-width:24ch\">para ir ao ar, contra trimestres de dev customizado<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Schibsted Grotesk',sans-serif;font-size:clamp(2.6rem,5vw,3.7rem);font-weight:800;line-height:1\">0<\u002Fdiv><div style=\"margin-top:10px;color:#D6EAFB;font-size:.98rem;max-width:24ch\">linhas de código customizado pra manter<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Schibsted Grotesk',sans-serif;font-size:clamp(2.6rem,5vw,3.7rem);font-weight:800;line-height:1\"><span data-count=\"100\" data-suf=\"%\">100%<\u002Fspan><\u002Fdiv><div style=\"margin-top:10px;color:#D6EAFB;font-size:.98rem;max-width:24ch\">de isolamento de dados entre sellers, por arquitetura<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:30px;color:#9FC8E8;font-size:.78rem;font-family:'IBM Plex Mono',monospace\">* Números ilustrativos para a etapa de design.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CTA ============ -->\n<section id=\"cta\" style=\"padding:90px 0;background:#FFFFFF\">\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n    <div data-reveal=\"\" style=\"position:relative;overflow:hidden;border-radius:26px;background:linear-gradient(135deg,#1E232B,#2A313C);padding:74px 40px;text-align:center;color:#fff\">\n      <div style=\"position:absolute;right:-8%;top:-46%;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(30,161,255,.4),transparent 60%);pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:relative;z-index:2\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:#8FD0FF\">Comece agora<\u002Fspan>\n        <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;letter-spacing:-.025em;color:#fff;font-size:clamp(2rem,4vw,3rem);margin:14px 0 14px;line-height:1.06\">Pronto pra abrir sua plataforma?<\u002Fh2>\n        <p style=\"color:#C9D8EC;font-size:1.12rem;max-width:50ch;margin:0 auto 30px\">Roda sobre o Salesforce Commerce que você já tem. A gente mostra a arquitetura completa numa call.<\u002Fp>\n        <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap\">\n          <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:.55rem;background:#1EA1FF;color:#1E232B;font-weight:600;font-size:1.05rem;padding:.95rem 1.7rem;border-radius:12px;text-decoration:none;box-shadow:0 12px 30px -8px rgba(30,161,255,.6)\" style-hover=\"background:#1389E6;transform:translateY(-2px)\">Agendar uma demo\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n          <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:.5rem;background:transparent;color:#fff;font-weight:600;font-size:1.05rem;padding:.95rem 1.6rem;border-radius:12px;text-decoration:none;border:1.5px solid rgba(255,255,255,.5)\" style-hover=\"border-color:#fff;background:rgba(255,255,255,.08)\">Falar com vendas<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer style=\"background:#1E232B;color:#fff;padding:62px 0 36px\">\n  <div data-pad=\"\" style=\"max-width:1180px;margin:0 auto;padding:0 32px;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap\">\n    <div style=\"max-width:280px\">\n      <a href=\"#top\" style=\"display:inline-flex;align-items:center;gap:.55rem;text-decoration:none\">\n        <svg viewBox=\"0 0 118 136\" style=\"height:30px;width:auto\"><use href=\"#cmono-light\"><\u002Fuse><\u002Fsvg>\n        <span style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:500;font-size:1.3rem;letter-spacing:-.04em;line-height:1\"><span style=\"color:#F7F7FA\">carbon<\u002Fspan><span style=\"color:#1EA1FF;font-weight:800\">marketplace<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <p style=\"color:#8189A0;font-size:.92rem;margin-top:14px\">Infraestrutura de marketplace B2B sobre Salesforce Commerce Cloud. Um produto Carbon.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h4 style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#8FD0FF;margin-bottom:15px;font-weight:500\">Produto<\u002Fh4>\n      <a href=\"#produto\" style=\"display:block;color:#AEB6CC;text-decoration:none;font-size:.94rem;margin-bottom:10px\" style-hover=\"color:#fff\">Por dentro<\u002Fa>\n      <a href=\"#comparar\" style=\"display:block;color:#AEB6CC;text-decoration:none;font-size:.94rem;margin-bottom:10px\" style-hover=\"color:#fff\">Por que Carbon<\u002Fa>\n      <a href=\"#recursos\" style=\"display:block;color:#AEB6CC;text-decoration:none;font-size:.94rem;margin-bottom:10px\" style-hover=\"color:#fff\">Recursos<\u002Fa>\n    <\u002Fdiv>\n    <div>\n      <h4 style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#8FD0FF;margin-bottom:15px;font-weight:500\">Empresa<\u002Fh4>\n      <a href=\"#\" style=\"display:block;color:#AEB6CC;text-decoration:none;font-size:.94rem;margin-bottom:10px\" style-hover=\"color:#fff\">Sobre a Carbon<\u002Fa>\n      <a href=\"#\" style=\"display:block;color:#AEB6CC;text-decoration:none;font-size:.94rem;margin-bottom:10px\" style-hover=\"color:#fff\">Outros produtos<\u002Fa>\n      <a href=\"#\" style=\"display:block;color:#AEB6CC;text-decoration:none;font-size:.94rem;margin-bottom:10px\" style-hover=\"color:#fff\">Contato<\u002Fa>\n    <\u002Fdiv>\n    <div>\n      <h4 style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#8FD0FF;margin-bottom:15px;font-weight:500\">Comece<\u002Fh4>\n      <a href=\"#cta\" style=\"display:block;color:#AEB6CC;text-decoration:none;font-size:.94rem;margin-bottom:10px\" style-hover=\"color:#fff\">Agendar demo<\u002Fa>\n      <a href=\"#\" style=\"display:block;color:#AEB6CC;text-decoration:none;font-size:.94rem;margin-bottom:10px\" style-hover=\"color:#fff\">Falar com vendas<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div data-pad=\"\" style=\"max-width:1180px;margin:46px auto 0;padding:24px 32px 0;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;color:#8189A0;font-size:.84rem;flex-wrap:wrap;gap:10px;font-family:'IBM Plex Mono',monospace\">\n    <span>© 2026 Carbon. Todos os direitos reservados.<\u002Fspan>\n    <span>Carbon Marketplace™ · feito no Brasil<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { tab: 'overview' };\n\n  setTab(t){ this.setState({ tab: t }); }\n\n  pill(active){\n    return {\n      display:'inline-flex', alignItems:'center', gap:'8px',\n      padding:'10px 18px', borderRadius:'999px',\n      cursor:'pointer', fontWeight:600, fontSize:'.95rem',\n      transition:'background .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease',\n      userSelect:'none', whiteSpace:'nowrap',\n      border: active ? '1px solid #1E232B' : '1px solid #E2E7F0',\n      color: active ? '#FFFFFF' : '#5E6573',\n      background: active ? '#1E232B' : '#FFFFFF',\n      boxShadow: active ? '0 10px 22px -10px rgba(30,35,43,.5)' : 'none'\n    };\n  }\n\n  meta(){\n    return {\n      overview:  { title:'Tudo que precisa de atenção, num lugar só', desc:'O seller abre o painel e já vê pedidos urgentes, alertas de catálogo e o resumo da loja no período.' },\n      pedidos:   { title:'Do convite ao despacho, sem planilha', desc:'Pedidos separados por etapa, busca por comprador e exportação — o status sempre na verdade do momento.' },\n      produtos:  { title:'Catálogo com aprovação e curadoria', desc:'Ativos, rascunhos e reprovados organizados. Nada vai à vitrine sem passar pelo seu crivo.' },\n      financeiro:{ title:'Repasses e comissões transparentes', desc:'Total recebido, previsto e saldo atual calculados por ciclo. O financeiro do seller fecha sozinho.' }\n    };\n  }\n\n  renderVals(){\n    const t = this.state.tab;\n    const m = this.meta()[t] || this.meta().overview;\n    return {\n      setOverview:   () => this.setTab('overview'),\n      setPedidos:    () => this.setTab('pedidos'),\n      setProdutos:   () => this.setTab('produtos'),\n      setFinanceiro: () => this.setTab('financeiro'),\n      pillOverview:   this.pill(t === 'overview'),\n      pillPedidos:    this.pill(t === 'pedidos'),\n      pillProdutos:   this.pill(t === 'produtos'),\n      pillFinanceiro: this.pill(t === 'financeiro'),\n      opOverview:   t === 'overview' ? 1 : 0,\n      opPedidos:    t === 'pedidos' ? 1 : 0,\n      opProdutos:   t === 'produtos' ? 1 : 0,\n      opFinanceiro: t === 'financeiro' ? 1 : 0,\n      activeTitle: m.title,\n      activeDesc:  m.desc,\n      rootRef: (el) => { if (el) this._root = el; }\n    };\n  }\n\n  countUp(el){\n    const target = parseFloat(el.getAttribute('data-count'));\n    if (isNaN(target)) return;\n    const pre = el.getAttribute('data-pre') || '';\n    const suf = el.getAttribute('data-suf') || '';\n    const dur = 1100, start = performance.now();\n    const tick = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      const v = Math.round(target * e);\n      el.textContent = pre + v.toLocaleString('pt-BR') + suf;\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  componentDidMount(){\n    const scope = this._root || document;\n\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting){\n          en.target.style.transition = 'opacity .7s cubic-bezier(.2,.7,.3,1), transform .7s cubic-bezier(.2,.7,.3,1)';\n          en.target.style.opacity = 1;\n          en.target.style.transform = 'none';\n          io.unobserve(en.target);\n        }\n      });\n    }, { threshold: .14 });\n    scope.querySelectorAll('[data-reveal]').forEach((el) => {\n      el.style.opacity = 0;\n      el.style.transform = 'translateY(22px)';\n      io.observe(el);\n    });\n\n    const cio = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting){ this.countUp(en.target); cio.unobserve(en.target); }\n      });\n    }, { threshold: .5 });\n    scope.querySelectorAll('[data-count]').forEach((el) => cio.observe(el));\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
